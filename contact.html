<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Simple Blog Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
     <nav class="navbar">
        <div class="navdiv">
            <div id="logo">📖Tech Blogs</div>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="blogs.html">Blogs</a></li>
                <li><a href="add_blog.html">Add Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <form>
                    <input type="search" placeholder="Search blogs">
                    <button>🔍</button>
                </form>
            </ul>
        </div>
    </nav>

    <div class="contact">
        <h1>Contact Us</h1>
        <p>Let's Connect<br>
        Have a question, suggestion, or feedback?<br>
        We're always happy to hear from you. Fill out the form below, and we'll get back to you soon.</p>

        <form>
            <div id="name">
                <label>Name</label>
                <input type="text">
            </div>
            <div id="email">
                <label>Email</label>
                <input type="email">
            </div>
            <div id="subj">
                <label>Subject</label>
                <input type="text">
            </div>
            <div id="msg">
                <label>Message</label>
                <textarea></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>
    </div>


     <footer>
        <div id="about">&copy 2026 Tech Blog| Created by <b>Arpita Ghosh</b></div>
        <div id="social_icons">
            <ul>
                <li><a href="https://facebook.com" target="_blank" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a></li>
                <li><a href="https://twitter.com" target="_blank" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a></li>
                <li><a href="https://instagram.com" target="_blank" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a></li>
                <li><a href="https://github.com" target="_blank" aria-label="GitHub"><i class="fa-brands fa-github"></i></a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
