<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Blog Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body class="form">
    <nav class="navbar">
        <div class="navdiv">
            <div id="logo">📖Tech Blogs</div>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="blogs.html">Blogs</a></li>
                <li><a href="add_blog.html">Add Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <form>
                    <input type="search" placeholder="Search blogs">
                    <button>🔍</button>
                </form>
            </ul>
        </div>
    </nav>

    <h2>Add New Blog</h2>
    <div class="form-container">
        <form id="content">
            <div class="form-group">
                <label class="reqd">Blog Title<span style="color: red;">*</span></label>
                <input type="text" id="title" placeholder="Enter blog title">
            </div>
            <div class="form-group">
                <label>Category<span style="color: red;">*</span></label>
                <select>
                    <option value="HTML">HTML</option>
                    <option value="CSS">CSS</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="Node.js">Node.js</option>
                </select>
            </div>
            <div class="form-group">
                <label class="reqd">Author Name<span style="color: red;">*</span></label>
                <input type="text" id="author" placeholder="Enter author name">
            </div>
            <div class="form-group">
                <label>Blog Image URL</label>
                <input type="url" id="image-url" placeholder="Enter image urls">
            </div>
            <div class="form-group">
                <label class="reqd">Short Description<span style="color: red;">*</span></label>
                <textarea id="shortDesc" placeholder="Add a short description"></textarea>
            </div>
            <div class="form-group">
                <label class="reqd">Blog Content<span style="color: red;">*</span></label>
                <textarea id="txt" placeholder="Write your blog content here"></textarea>
            </div>
            <div class="form-group">
                <label>Tags</label>
                <input type="text" placeholder="#HIML #CSS #JavaScript">
            </div>
            <div class="buttons">
                <button type="submit">Publish</button>
                <button type="reset" onclick="return confirm('Are you sure you want to clear all fields?');">Clear</button>
            </div>

        </form>
    </div>

     <footer>
        <div id="about">&copy; 2026 Tech Blog | Created by <b>Arpita Ghosh</b></div>
        <div id="social_icons">
        <a href="https://facebook.com" target="_blank">
            <i class="fa-brands fa-facebook"></i>
        </a>
        <a href="https://twitter.com" target="_blank">
            <i class="fa-brands fa-x-twitter"></i>
        </a>
        <a href="https://instagram.com" target="_blank">
            <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="https://github.com" target="_blank">
            <i class="fa-brands fa-github"></i>
        </a>
    </div>
</footer>

<script src="JS/script.js"></script>

</body>
</html>
