<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Published</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f6f9;
            font-family: Arial, sans-serif;
        }
        .success-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .success-card h2 {
            color: #2e7d32;
            margin-bottom: 15px;
        }
        .success-card p {
            font-size: 16px;
            color: #555;
            margin-bottom: 25px;
        }
        .submit-again-link {
            color: #1d7de2;
            text-decoration: underline;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .submit-again-link:hover {
            color: #0d5cb6;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <h2>Your blog has been published!</h2>
        <p>Your content has been submitted successfully.</p>
        <a href="add_blog.html" class="submit-again-link">Submit another response</a>
    </div>

</body>
</html>
